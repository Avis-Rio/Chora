name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Smoke-test imports
        env:
          GROQ_API_KEY: ci-stub
          GEMINI_API_KEY: ci-stub
          LLM_API_KEY: ci-stub
        run: |
          set -e
          python -c "import sys; sys.path.insert(0, '.'); import generate_cover, distribution_pipeline, feishu_service, xiaoyuzhou_service, youtube_service; print('imports OK')"

      - name: Run pytest (diagnose-by-file)
        env:
          GROQ_API_KEY: ci-stub
          GEMINI_API_KEY: ci-stub
          LLM_API_KEY: ci-stub
        run: |
          set +e
          python -m pytest --version

          echo "========== COLLECTION-ONLY START =========="
          python -m pytest tests/distribution_pipeline --collect-only 2>&1 \
            | head -120 || true
          echo "========== COLLECTION-ONLY END =========="

          # Try each test file individually and report which ones fail at collection
          echo "========== PER-FILE COLLECTION START =========="
          for f in tests/distribution_pipeline/test_*.py; do
            out=$(python -m pytest "$f" --collect-only 2>&1)
            if [ $? -ne 0 ]; then
              echo "FAILED COLLECT: $f"
              echo "$out" | head -30
              echo "----"
            fi
          done
          echo "========== PER-FILE COLLECTION END =========="

          echo "========== FULL PYTEST RUN START =========="
          python -m pytest tests/distribution_pipeline --tb=short 2>&1 \
            | tail -80
          rc=${PIPESTATUS[0]}
          echo "========== FULL PYTEST RUN END (exit=$rc) =========="
          exit $rc

      - name: Upload pytest log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log-${{ matrix.python-version }}
          path: /tmp/pytest_output.txt
          retention-days: 7

  lint-skill-md:
    name: Validate SKILL.md front matter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check SKILL.md front matter (name + description required)
        run: |
          set -e
          for f in $(find skills -name 'SKILL.md'); do
            echo "checking $f"
            head -1 "$f" | grep -q '^---$' || { echo "  ❌ missing leading ---"; exit 1; }
            grep -q '^name:' "$f"     || { echo "  ❌ missing name field"; exit 1; }
            grep -q '^description:' "$f" || { echo "  ❌ missing description field"; exit 1; }
          done
          echo "✅ All SKILL.md files have valid YAML front matter"
