name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Prepare runtime config
        run: |
          # config/*.yaml 被 .gitignore 忽略（避免泄漏真实密钥）；
          # CI 用 sources.example.yaml 作为模板，
          # 必含字段让 vision_subject_mapper 等下游模块能加载。
          cp config/sources.example.yaml config/sources.yaml

      - name: Smoke-test imports
        env:
          GROQ_API_KEY: ci-stub
          GEMINI_API_KEY: ci-stub
          LLM_API_KEY: ci-stub
        run: |
          python -c "import sys; sys.path.insert(0, '.'); import generate_cover, distribution_pipeline, feishu_service, xiaoyuzhou_service, youtube_service; print('imports OK')"

      - name: Run pytest
        env:
          GROQ_API_KEY: ci-stub
          GEMINI_API_KEY: ci-stub
          LLM_API_KEY: ci-stub
        run: |
          python -m pytest tests/distribution_pipeline -q --tb=short

      - name: Upload pytest log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log-${{ matrix.python-version }}
          path: |
            /tmp/pytest_stdout.txt
            /tmp/pytest_stderr.txt
          retention-days: 7

  lint-skill-md:
    name: Validate SKILL.md front matter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check SKILL.md front matter (name + description required)
        run: |
          set -e
          for f in $(find skills -name 'SKILL.md'); do
            echo "checking $f"
            head -1 "$f" | grep -q '^---$' || { echo "  ❌ missing leading ---"; exit 1; }
            grep -q '^name:' "$f"     || { echo "  ❌ missing name field"; exit 1; }
            grep -q '^description:' "$f" || { echo "  ❌ missing description field"; exit 1; }
          done
          echo "✅ All SKILL.md files have valid YAML front matter"
